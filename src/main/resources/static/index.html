<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen User - Spring Boot CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .id-column { font-family: monospace; color: #6c757d; font-size: 0.8rem; }
    </style>
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-10">
        <h2 class="text-center mb-4">User Management System</h2>

        <div class="card mb-5">
            <div class="card-body">
                <h5 class="card-title mb-3" id="formTitle">Tambah User Baru</h5>
                <form id="userForm">
                    <input type="hidden" id="userId">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" id="userName" class="form-control" placeholder="Nama..." required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Umur</label>
                            <input type="number" id="userAge" class="form-control" placeholder="Umur..." required>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <div class="w-100">
                                <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Simpan</button>
                                <button type="button" id="btnCancel" class="btn btn-secondary w-100 mt-2" style="display:none;" onclick="resetForm()">Batal</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="table-container">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="m-0">Daftar Pengguna Aktif</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="loadUsers()">Refresh Data</button>
            </div>
            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th width="30%">ID</th>
                    <th>Nama</th>
                    <th>Umur</th>
                    <th class="text-center">Aksi</th>
                </tr>
                </thead>
                <tbody id="userTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const apiUrl = '/api/users';

    $(document).ready(function() {
        loadUsers();

        // Handler Submit (Create & Update)
        $('#userForm').on('submit', function(e) {
            e.preventDefault();

            const id = $('#userId').val();
            const userData = {
                name: $('#userName').val(),
                age: parseInt($('#userAge').val())
            };

            // Jika ada ID, maka lakukan PUT (Update), jika tidak POST (Tambah)
            const type = id ? 'PUT' : 'POST';
            const url = id ? `${apiUrl}/${id}` : apiUrl;

            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(userData),
                success: function(response) {
                    alert('Data berhasil disimpan!');
                    resetForm();
                    loadUsers();
                },
                error: function(xhr) {
                    alert('Gagal: ' + xhr.status);
                    console.error(xhr.responseText);
                }
            });
        });
    });

    // 1. GET: Ambil Data
    function loadUsers() {
        $.get(apiUrl, function(response) {
            let rows = '';
            // Akses 'response.data' karena di Java kamu pakai Map.of("data", result)
            const users = response.data;

            if (!users || users.length === 0) {
                rows = '<tr><td colspan="4" class="text-center text-muted">Belum ada data.</td></tr>';
            } else {
                users.forEach(user => {
                    rows += `
                    <tr>
                        <td class="id-column">${user.id}</td>
                        <td><strong>${user.name}</strong></td>
                        <td>${user.age} Tahun</td>
                        <td class="text-center">
                            <button class="btn btn-warning btn-sm me-1" onclick="editUser('${user.id}', '${user.name}', ${user.age})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">Hapus</button>
                        </td>
                    </tr>`;
                });
            }
            $('#userTableBody').html(rows);
        }).fail(function() {
            console.error("Gagal terhubung ke API");
        });
    }

    // 2. DELETE: Hapus Data
    function deleteUser(id) {
        if (confirm('Apakah anda yakin ingin menghapus data ini?')) {
            $.ajax({
                url: `${apiUrl}/${id}`,
                type: 'DELETE',
                success: function() {
                    alert('Data terhapus!');
                    loadUsers();
                },
                error: function(xhr) {
                    alert('Gagal menghapus: ' + xhr.status);
                }
            });
        }
    }

    // Helper: Masuk Mode Edit
    function editUser(id, name, age) {
        $('#userId').val(id);
        $('#userName').val(name).focus();
        $('#userAge').val(age);

        $('#formTitle').text('Update Data User');
        $('#btnSubmit').text('Simpan Perubahan').removeClass('btn-primary').addClass('btn-success');
        $('#btnCancel').show();
    }

    // Helper: Reset Form ke Mode Tambah
    function resetForm() {
        $('#userId').val('');
        $('#userForm')[0].reset();
        $('#formTitle').text('Tambah User Baru');
        $('#btnSubmit').text('Simpan').removeClass('btn-success').addClass('btn-primary');
        $('#btnCancel').hide();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
